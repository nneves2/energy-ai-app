<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home Hybrid Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 flex flex-col md:flex-row h-screen">

    <div class="w-full md:w-2/3 p-6 md:p-10 border-r border-gray-700 overflow-y-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-blue-400">Energy Intelligence</h1>
            <p class="text-gray-400">Real-time Hybrid Data Analysis</p>
        </header>

        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-2xl">
            <canvas id="mainChart" height="150"></canvas>
        </div>

        <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-gray-800 p-4 rounded-lg border border-gray-700">
                <span class="text-gray-400 text-xs uppercase">System Status</span>
                <div class="text-green-400 font-mono">BRAIN_ONLINE</div>
            </div>
            <div class="bg-gray-800 p-4 rounded-lg border border-gray-700">
                <span class="text-gray-400 text-xs uppercase">Connected Datasets</span>
                <div class="text-blue-300 font-mono text-sm">devices, usage, events</div>
            </div>
        </div>
    </div>

    <div class="w-full md:w-1/3 flex flex-col bg-gray-800 shadow-left">
        <div class="p-6 border-b border-gray-700 flex justify-between items-center">
            <span class="font-bold text-xl text-blue-400">AI Data Analyst</span>
            <span id="statusIndicator" class="h-3 w-3 bg-green-500 rounded-full animate-pulse"></span>
        </div>
        
        <div id="chatHistory" class="flex-1 p-6 overflow-y-auto space-y-4 text-sm scrollbar-thin scrollbar-thumb-gray-600">
            <div class="bg-blue-900/20 p-3 rounded border border-blue-800 text-blue-200">
                System initialized. Ask me anything about the three datasets (Devices, Usage, or Events).
            </div>
        </div>

        <div class="p-4 border-t border-gray-700 bg-gray-900/50">
            <div class="flex gap-2">
                <input type="text" id="userInput" 
                       placeholder="Summarize energy usage..." 
                       class="flex-1 bg-gray-900 p-3 rounded-lg border border-gray-700 outline-none focus:border-blue-500 transition-all text-white">
                <button onclick="askAI()" id="sendBtn" 
                        class="bg-blue-600 px-6 py-3 rounded-lg font-bold hover:bg-blue-700 active:scale-95 transition-all">
                    Ask
                </button>
            </div>
        </div>
    </div>

    <script>
        // 1. Initial Dashboard Chart
        const ctx = document.getElementById('mainChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['00:00', '04:00', '08:00', '12:00', '16:00', '20:00'],
                datasets: [{
                    label: 'Grid Load (kW)',
                    data: [1.2, 0.8, 3.5, 4.2, 3.8, 5.1],
                    borderColor: '#3b82f6',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(59, 130, 246, 0.1)'
                }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });

        // 2. The AI Connection Logic
        async function askAI() {
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            const history = document.getElementById('chatHistory');
            const query = input.value.trim();
            const data = await response.json();
            console.log("AI Response Data:", data); // ADD THIS LINE
            history.innerHTML += `<div>${data.answer}</div>`;

            if (!query) return;

            // Update UI
            btn.disabled = true;
            btn.innerText = "Processing...";
            history.innerHTML += `<div class="text-right ml-10"><span class="bg-gray-700 p-3 rounded-lg inline-block">${query}</span></div>`;
            input.value = "";
            history.scrollTop = history.scrollHeight;

            try {
                // REPLACE THIS URL WITH YOUR ACTUAL DIRECT HF SUBDOMAIN
                const HF_URL = 'https://nneves2-energy-ai-brain.hf.space/ask'; 
            
                
                const response = await fetch(HF_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: query })
                });

                if (!response.ok) throw new Error(`Server returned ${response.status}`);

                const data = await response.json();
                
                // Add the AI response to the chat
                history.innerHTML += `
                    <div class="flex flex-col gap-1 mr-10">
                        <span class="text-[10px] text-gray-500 ml-1">GEMINI AI</span>
                        <div class="bg-blue-900/30 p-3 rounded-lg border border-blue-800 text-blue-100 italic">
                            ${data.answer}
                        </div>
                    </div>`;

            } catch (err) {
                console.error("Fetch Error:", err);
                history.innerHTML += `
                    <div class="bg-red-900/20 p-3 rounded border border-red-800 text-red-400">
                        <strong>Error:</strong> ${err.message}. Check if your Space is public and running.
                    </div>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "Ask";
                history.scrollTop = history.scrollHeight;
            }
        }

        // Allow "Enter" key to send
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') askAI();
        });
    </script>
</body>
</html>
