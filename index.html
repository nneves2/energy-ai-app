<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Home Hybrid Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 flex h-screen">

    <div class="w-2/3 p-10 border-r border-gray-700">
        <h1 class="text-3xl font-bold text-blue-400 mb-6">Energy Intelligence</h1>
        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <div class="w-1/3 flex flex-col bg-gray-800">
        <div class="p-6 border-b border-gray-700 font-bold text-xl">AI Data Analyst</div>
        <div id="chatHistory" class="flex-1 p-6 overflow-y-auto space-y-4 text-sm">
            <div class="bg-blue-900/20 p-3 rounded border border-blue-800">Ask me about your energy logs!</div>
        </div>
        <div class="p-4 border-t border-gray-700">
            <input type="text" id="userInput" placeholder="Why was usage high on Tuesday?" 
                   class="w-full bg-gray-900 p-3 rounded border border-gray-600 outline-none focus:border-blue-500">
            <button onclick="askAI()" class="w-full mt-2 bg-blue-600 p-3 rounded font-bold hover:bg-blue-700">Ask Gemini</button>
        </div>
    </div>

    <script>
        // 1. Static Chart for visual "Hybrid" feel
        new Chart(document.getElementById('mainChart'), {
            type: 'bar',
            data: {
                labels: ['D101', 'D102', 'D103', 'D104'],
                datasets: [{ label: 'Avg Consumption', data: [0.12, 1.5, 7.2, -3.5], backgroundColor: '#3b82f6' }]
            }
        });

        // 2. Chat logic connecting to Hugging Face
        async function askAI() {
            const btn = document.querySelector('button');
            const input = document.getElementById('userInput');
            const history = document.getElementById('chatHistory');
            const query = input.value;
            
            if(!query) return;
            btn.innerText = "Thinking...";
            history.innerHTML += `<div class="text-right text-gray-400">${query}</div>`;
            input.value = "";

            try {
                // REPLACE THIS URL with your actual Hugging Face Space URL
                const response = await fetch('https://nneves2-my-energy-ai.hf.space/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({text: query})
                });
                const data = await response.json();
                history.innerHTML += `<div class="bg-blue-900/20 p-3 rounded border border-blue-800">${data.answer}</div>`;
            } catch (e) {
                history.innerHTML += `<div class="text-red-500">Error: Space might be sleeping or URL is wrong.</div>`;
            }
            btn.innerText = "Ask Gemini";
            history.scrollTop = history.scrollHeight;
        }
    </script>
</body>
</html>
